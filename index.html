<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
background:#020617;
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(0,255,150,0.2);
text-align:center;
}

.title{
font-family:Bebas Neue;
font-size:42px;
letter-spacing:4px;
background:linear-gradient(90deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbow 6s linear infinite
}

@keyframes rainbow{
0%{background-position:0}
100%{background-position:400%}
}

.box{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
text-align:left;
}

.box h3{
font-size:14px;
margin-bottom:5px;
color:#22c55e;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #1e293b;
background:#000;
color:white;
margin-top:8px;
}

.rgb-btn{
margin-top:10px;
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#000;
color:white;
font-family:Montserrat;
cursor:pointer;
position:relative;
}

.rgb-btn:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:12px;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgbmove 8s linear infinite
}

@keyframes rgbmove{
0%{background-position:0}
100%{background-position:400%}
}

.result{margin-top:15px;font-size:14px}
.success{color:#22c55e}
.error{color:#ef4444}

.linkbox{
margin-top:10px;
padding:10px;
background:#000;
border-radius:10px;
border:1px solid #1e293b;
}

.copy{
margin-top:6px;
padding:8px;
width:100%;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
}

.history{
margin-top:15px;
padding:12px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
font-size:12px;
text-align:left;
}

.item{
margin-top:8px;
padding:6px;
border-bottom:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<!-- VIP -->
<div class="box">
<h3>💎 KEY VIP</h3>
<input id="vip-key" placeholder="Nhập KEY VIP">
<button class="rgb-btn" onclick="vip()">Kích hoạt VIP</button>
</div>

<!-- FREE -->
<div class="box">
<h3>🎁 KEY FREE</h3>
<input id="free-key" placeholder="Nhập KEY FREE">
<button class="rgb-btn" onclick="freeKey()">Nhận bản Free</button>
</div>

<div id="result" class="result"></div>

<div id="history" class="history"></div>

</div>
</div>

<script>

const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/AdminTunDeveloped/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/AdminTunDeveloped/main/key.json";

let CONFIG={},KEY_DATA={};
let history=JSON.parse(localStorage.getItem("tun_history"))||[];

async function load(){
CONFIG=await (await fetch(CONFIG_URL+"?t="+Date.now())).json();
KEY_DATA=await (await fetch(KEY_URL+"?t="+Date.now())).json();
}

function copy(text){
navigator.clipboard.writeText(text);
alert("📋 Đã copy");
}

function download(link){
window.location.href = link;
}

function save(type,link){
history.unshift({type,link,time:new Date().toLocaleTimeString()});
if(history.length>10)history.length=10;
localStorage.setItem("tun_history",JSON.stringify(history));
render();
}

function render(){
let h=document.getElementById("history");

if(history.length===0){
h.innerHTML="📜 Chưa có lịch sử";
return;
}

h.innerHTML="<b>📜 Lịch sử tải:</b>"+history.map(i=>`
<div class="item">
${i.type} • ${i.time}<br>
<button class="copy" onclick="copy('${i.link}')">📋 COPY</button>
</div>
`).join("");
}

function showLink(type,link){
document.getElementById("result").innerHTML = `
<div class="success">
${type}

<div class="linkbox">
<input value="${link}" readonly style="width:100%;background:black;color:white;border:none">
<button class="copy" onclick="copy('${link}')">📋 COPY LINK</button>
<button class="copy" onclick="download('${link}')">📥 TẢI NGAY</button>
</div>

</div>
`;
}

function vip(){
let k=document.getElementById("vip-key").value.trim();

let f=KEY_DATA.personal_keys.find(x=>x.key===k);

if(!f){
document.getElementById("result").innerHTML="<div class='error'>❌ Key VIP sai</div>";
return;
}

let link=CONFIG.scripts[f.platform+"_full"];

save("💎 VIP",link);
showLink("💎 Kích hoạt VIP thành công",link);
}

function freeKey(){
let k=document.getElementById("free-key").value.trim();

if(!KEY_DATA.community_keys.includes(k)){
document.getElementById("result").innerHTML="<div class='error'>❌ Key Free sai</div>";
return;
}

let link=CONFIG.scripts.android_free;

save("🎁 FREE",link);
showLink("🎁 Nhận bản Free thành công",link);
}

load();
render();

</script>

</body>
</html>
