<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
background:#020617;
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(0,255,150,0.2);
text-align:center;
}

.title{
font-family:Bebas Neue;
font-size:42px;
letter-spacing:4px;
background:linear-gradient(90deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbow 6s linear infinite
}

@keyframes rainbow{
0%{background-position:0}
100%{background-position:400%}
}

.tag{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
font-size:11px;
color:#94a3b8;
margin-top:6px;
}

.tag span{
background:#020617;
padding:4px 8px;
border-radius:8px;
border:1px solid #1e293b;
}

.box{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
text-align:left;
}

.box h3{font-size:14px;color:#22c55e}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #1e293b;
background:#000;
color:white;
margin-top:8px;
}

.rgb-btn{
margin-top:10px;
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#000;
color:white;
font-family:Montserrat;
cursor:pointer;
position:relative;
z-index:1;
}

.rgb-btn:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:12px;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgbmove 6s linear infinite
}

@keyframes rgbmove{
0%{background-position:0}
100%{background-position:400%}
}

.result{margin-top:15px}
.success{color:#22c55e}
.error{color:#ef4444}

.linkbox{
margin-top:10px;
padding:10px;
background:#000;
border-radius:10px;
border:1px solid #1e293b;
}

.copy{
margin-top:6px;
padding:8px;
width:100%;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
}

.history{
margin-top:15px;
padding:12px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
font-size:12px;
text-align:left;
}

.fab{
position:fixed;
bottom:18px;
right:18px;
width:48px;
height:48px;
border-radius:50%;
background:#000;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
z-index:999;
}

.fab:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:50%;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgbmove 6s linear infinite
}

.contact-menu{
position:fixed;
bottom:75px;
right:18px;
display:flex;
flex-direction:column;
gap:8px;
opacity:0;
pointer-events:none;
transform:translateY(10px);
transition:0.25s;
z-index:999;
}

.contact-btn{
width:140px;
padding:10px;
border-radius:10px;
background:#000;
color:white;
text-align:center;
font-size:12px;
text-decoration:none;
font-family:Montserrat;
position:relative;
z-index:1;
}

.contact-btn:before{
content:"";
position:absolute;
top:-2px;left:-2px;right:-2px;bottom:-2px;
border-radius:12px;
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8);
background-size:400%;
z-index:-1;
animation:rgbmove 6s linear infinite
}

.contact-menu.show{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<div class="tag">
<span>🟢 Online</span>
<span>🔐 Bảo mật</span>
<span>🚀 Tối ưu</span>
</div>

<div class="box">
<h3>💎 KEY VIP</h3>
<input id="vip-key" placeholder="Nhập KEY VIP">
<button class="rgb-btn" onclick="vip()">Kích hoạt VIP</button>
</div>

<div class="box">
<h3>🎁 KEY FREE</h3>
<input id="free-key" placeholder="Nhập KEY FREE">
<button class="rgb-btn" onclick="freeKey()">Nhận bản Free</button>
</div>

<div id="result" class="result"></div>
<div id="history" class="history"></div>

</div>
</div>

<div class="fab" onclick="toggleContact()">💬</div>

<div id="contact-menu" class="contact-menu">
<a class="contact-btn" href="https://zalo.me/0378099746" target="_blank">Zalo</a>
<a class="contact-btn" href="https://t.me/TunDeveloped" target="_blank">Telegram</a>
<a class="contact-btn" href="https://facebook.com/" target="_blank">Facebook</a>
</div>

<script>

const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDev/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDev/main/key.json";

let CONFIG={scripts:{}};
let KEY_DATA={personal_keys:[],community_keys:[]};
let LOADED=false;

async function load(){
try{
let c=await fetch(CONFIG_URL);
CONFIG=await c.json();

let k=await fetch(KEY_URL);
KEY_DATA=await k.json();

LOADED=true;
console.log("✅ LOAD OK", CONFIG, KEY_DATA);

}catch(e){
console.log("❌ LOAD FAIL", e);
}
}

function showError(msg){
document.getElementById("result").innerHTML="<div class='error'>"+msg+"</div>";
}

function showLink(type,link){
document.getElementById("result").innerHTML=`
<div class="success">${type}
<div class="linkbox">
<input value="${link}" readonly>
<button onclick="copy('${link}')">COPY</button>
</div>
</div>`;
}

function copy(t){
navigator.clipboard.writeText(t);
alert("Đã copy");
}

function vip(){

if(!LOADED) return showError("⏳ Đang load dữ liệu...");

let k=document.getElementById("vip-key").value.trim();
if(!k) return showError("❌ Nhập key");

let obj=KEY_DATA.personal_keys.find(x=>x.key===k);

if(!obj){
console.log("KEY_DATA:", KEY_DATA);
return showError("❌ Key VIP sai");
}

let link=CONFIG.scripts[obj.platform+"_full"];

if(!link) return showError("❌ Config lỗi");

showLink("💎 VIP OK",link);
}

function freeKey(){

if(!LOADED) return showError("⏳ Đang load dữ liệu...");

let k=document.getElementById("free-key").value.trim();
if(!k) return showError("❌ Nhập key");

if(!KEY_DATA.community_keys.includes(k)){
console.log("FREE LIST:", KEY_DATA.community_keys);
return showError("❌ Key free sai");
}

let link=CONFIG.scripts.android_free;

showLink("🎁 FREE OK",link);
}

function toggleContact(){
document.getElementById("contact-menu").classList.toggle("show");
}

load();

</script>
