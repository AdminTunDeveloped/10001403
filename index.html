<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUN DEVELOPED SOFTWARE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0f0f1a, #1a1a2e); color: #00ffcc; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; padding: 30px 0; border-bottom: 3px solid #00ffcc; }
        h1 { font-size: 2.5rem; }
        .banner { background: rgba(0,255,204,0.1); text-align:center; padding:60px 20px; border-radius:15px; margin:20px 0; }
        .btn { background: #00ffcc; color:#000; border:none; padding:15px 30px; margin:10px; font-size:16px; font-weight:bold; border-radius:10px; cursor:pointer; }
        .btn:hover { background:#00ccaa; transform:scale(1.05); }
        .section { background:#16213e; padding:25px; margin:20px 0; border-radius:12px; border:1px solid #00ffcc33; }
        input, select { width:100%; padding:14px; margin:10px 0; background:#0a0a14; border:2px solid #00ffcc; color:white; border-radius:8px; font-size:16px; }
        .result { margin-top:15px; padding:15px; background:#0a0a14; border-radius:8px; min-height:60px; }
        .history-item { background:#0f0f1a; padding:15px; margin:10px 0; border-radius:8px; border-left:4px solid #00ffcc; }
        .copy-btn { background:#ffaa00; color:#000; padding:8px 15px; font-size:14px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👉 TUN DEVELOPED SOFTWARE</h1>
            <p>Phần mềm tối ưu game • Giảm lag • Ổn định mạng</p>
        </header>

        <div class="banner">
            <h2>SIÊU PHẨM TỐI ƯU GAME – HIỆU SUẤT ĐỈNH CAO</h2>
            <p>Tăng tốc độ mạng – Giảm ping</p>
        </div>

        <!-- UID -->
        <div class="section">
            <h2>🔐 Kích hoạt bằng UID (Trả phí)</h2>
            <input type="text" id="uid-input" placeholder="Nhập UID game">
            <select id="device-select">
                <option value="">Chọn thiết bị</option>
                <option value="Android">Android</option>
                <option value="iOS">iOS</option>
                <option value="PC">PC</option>
            </select>
            <button class="btn" onclick="checkUID()">XÁC NHẬN & KIỂM TRA</button>
            <div id="uid-result" class="result"></div>
        </div>

        <!-- KEY Free -->
        <div class="section">
            <h2>🔑 Kích hoạt bằng KEY miễn phí (Cộng đồng)</h2>
            <input type="text" id="key-input" placeholder="Nhập KEY cộng đồng">
            <button class="btn" onclick="checkKey()">KÍCH HOẠT KEY</button>
            <div id="key-result" class="result"></div>
        </div>

        <!-- LỊCH SỬ (mới) -->
        <div class="section">
            <h2>📜 Lịch sử kích hoạt & Link tải</h2>
            <div id="history-list"></div>
            <button class="btn" onclick="clearHistory()" style="background:#ff5555;">Xóa lịch sử</button>
        </div>
    </div>

    <script>
        // ================== LINK CONFIG.JSON (bên ngoài) ==================
        const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/AdminTunDeveloped/main/config.json";

        let CONFIG = {};

        // Load config.json từ GitHub
        async function loadConfig() {
            try {
                const res = await fetch(CONFIG_URL + "?t=" + Date.now());
                CONFIG = await res.json();
                console.log("✅ Đã load config.json thành công");
            } catch (e) {
                console.error("Không tải được config.json");
            }
        }

        // Lưu lịch sử (dùng localStorage)
        let history = JSON.parse(localStorage.getItem("tun_history")) || [];

        function saveHistory(item) {
            history.unshift(item);
            if (history.length > 20) history.length = 20; // giữ tối đa 20
            localStorage.setItem("tun_history", JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById("history-list");
            list.innerHTML = history.length === 0 
                ? "<p>Chưa có lịch sử kích hoạt nào.</p>"
                : history.map((h, i) => `
                    <div class="history-item">
                        <strong>${h.type}</strong> • ${h.time}<br>
                        <small>UID/KEY: ${h.id} | Nền tảng: ${h.platform}</small><br>
                        <button class="btn copy-btn" onclick="copyLink('${h.link}')">📋 Sao chép link tải</button>
                    </div>
                `).join("");
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Đã sao chép link vào clipboard!");
            });
        }

        function clearHistory() {
            if (confirm("Xóa toàn bộ lịch sử?")) {
                history = [];
                localStorage.removeItem("tun_history");
                renderHistory();
            }
        }

        // Kiểm tra UID
        async function checkUID() {
            const uid = document.getElementById("uid-input").value.trim();
            const platform = document.getElementById("device-select").value;
            const result = document.getElementById("uid-result");

            if (!uid || !platform) {
                result.innerHTML = `<p style="color:#ff5555">❌ Vui lòng nhập UID và chọn nền tảng!</p>`;
                return;
            }

            const link = CONFIG.scripts?.[`${platform.toLowerCase()}_full`] || "#";
            
            result.innerHTML = `
                <p style="color:lime">✅ UID hợp lệ! Kích hoạt thành công.</p>
                <p>Nền tảng: ${platform}</p>
                <p style="color:#ffaa00">Link tải đã được lưu vào LỊCH SỬ</p>
            `;

            // Lưu vào lịch sử
            saveHistory({
                type: "UID - Bản Full",
                id: uid,
                platform: platform,
                time: new Date().toLocaleString("vi-VN"),
                link: link
            });
        }

        // Kiểm tra KEY
        async function checkKey() {
            const key = document.getElementById("key-input").value.trim();
            const result = document.getElementById("key-result");

            if (!key) {
                result.innerHTML = `<p style="color:#ff5555">❌ Vui lòng nhập KEY!</p>`;
                return;
            }

            const link = CONFIG.scripts?.android_free || "#"; // mặc định Android free, bạn có thể chỉnh sau

            result.innerHTML = `
                <p style="color:lime">🎉 KEY hợp lệ! Kích hoạt bản miễn phí.</p>
                <p style="color:#ffaa00">Link tải đã được lưu vào LỊCH SỬ</p>
            `;

            saveHistory({
                type: "KEY - Bản Free",
                id: key,
                platform: "Android", // bạn có thể cho chọn platform sau
                time: new Date().toLocaleString("vi-VN"),
                link: link
            });
        }

        // Khởi chạy
        window.onload = () => {
            loadConfig();
            renderHistory();
        };
    </script>
</body>
</html>
